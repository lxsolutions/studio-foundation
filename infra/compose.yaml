# Local development infrastructure. Interactive Godot/Blender are NOT containerized.
# Usage: just services-up | just observability-up | just services-down
#
# Ports bind to STUDIO_PG_BIND_HOST / STUDIO_OBS_BIND_HOST (both default 127.0.0.1,
# i.e. host-loopback-only). When this compose file runs on a remote Docker host via
# STUDIO_INFRA_REMOTE (see infra/environments/README.md), set these to that host's
# private (e.g. Tailscale) interface address instead — never 0.0.0.0 — so dev
# services stay off the public internet either way.
name: studio-foundation

services:
  postgres:
    image: postgres:17-alpine # PostgreSQL License (permissive)
    environment:
      POSTGRES_DB: ${STUDIO_PG_DB:-studio}
      POSTGRES_USER: ${STUDIO_PG_USER:-studio}
      POSTGRES_PASSWORD: ${STUDIO_PG_PASSWORD:-studio_dev_password}
    ports:
      - "${STUDIO_PG_BIND_HOST:-127.0.0.1}:${STUDIO_PG_PORT:-5432}:5432"
    volumes:
      - studio_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STUDIO_PG_USER:-studio} -d ${STUDIO_PG_DB:-studio}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Optional tracing UI (Apache-2.0). OTLP on 4317/4318, UI on 16686.
  jaeger:
    image: jaegertracing/jaeger:2.4.0
    profiles: ["observability"]
    ports:
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:16686:16686"
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:4317:4317"
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:4318:4318"
    restart: unless-stopped

  # Nakama (Apache-2.0) — identity, social graph, parties, matchmaking, and the
  # authoritative RPC layer the world-sim graduates to (ADR 0007/0005). Its TS
  # runtime module lives in infra/nakama/src and is mounted build/ here.
  # Enable with the `nakama` profile: just nakama-up (see justfile).
  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0 # Apache-2.0
    profiles: ["nakama"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NAKAMA_DATABASE_ADDRESS: "${STUDIO_PG_USER:-studio}:${STUDIO_PG_PASSWORD:-studio_dev_password}@postgres:5432/${STUDIO_PG_DB:-studio}"
    entrypoint:
      - "/bin/sh"
      - "-ec"
      - >-
        /nakama/nakama migrate up --database.address "$${NAKAMA_DATABASE_ADDRESS}" &&
        exec /nakama/nakama --config /nakama/data/local.yml
    ports:
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7349:7349"   # gRPC API
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7350:7350"   # HTTP/WebSocket API
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7351:7351"   # developer console
    volumes:
      - ./nakama/build:/nakama/data/modules:ro
      - ./nakama/local.yml:/nakama/data/local.yml:ro
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Object storage is intentionally ABSENT until a demonstrated requirement exists
  # (GOAL.md principle 15). Reviewed candidate if needed: SeaweedFS (Apache-2.0).
  # MinIO was rejected: AGPL relicense + community build feature removal.
  # See docs/architecture/dependency-licenses.md.

volumes:
  studio_pg_data:
