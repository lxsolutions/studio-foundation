# Optional local development infrastructure. Interactive Godot and Blender are
# not containerized.
#
# Ports bind to STUDIO_*_BIND_HOST values that default to 127.0.0.1. For a
# remote Docker host, bind only to a private interface. Never publish these
# development defaults directly to the internet.
name: studio-foundation

services:
  postgres:
    image: postgres:17-alpine # PostgreSQL License (permissive)
    environment:
      POSTGRES_DB: ${STUDIO_PG_DB:-studio}
      POSTGRES_USER: ${STUDIO_PG_USER:-studio}
      POSTGRES_PASSWORD: ${STUDIO_PG_PASSWORD:-studio_dev_password}
    ports:
      - "${STUDIO_PG_BIND_HOST:-127.0.0.1}:${STUDIO_PG_PORT:-5432}:5432"
    volumes:
      - studio_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STUDIO_PG_USER:-studio} -d ${STUDIO_PG_DB:-studio}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Optional mechanics-neutral identity and authenticated application RPC bridge.
  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0 # Apache-2.0
    profiles: ["nakama"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NAKAMA_DATABASE_ADDRESS: "${STUDIO_PG_USER:-studio}:${STUDIO_PG_PASSWORD:-studio_dev_password}@postgres:5432/${STUDIO_PG_DB:-studio}"
      STUDIO_APPLICATION_URL: "${STUDIO_APPLICATION_URL:-http://host.docker.internal:8082/application-requests}"
      STUDIO_APPLICATION_TOKEN: "${STUDIO_APPLICATION_TOKEN:-}"
    entrypoint:
      - "/bin/sh"
      - "-ec"
      - >-
        /nakama/nakama migrate up --database.address "$${NAKAMA_DATABASE_ADDRESS}" &&
        exec /nakama/nakama --config /nakama/data/local.yml
        --database.address "$${NAKAMA_DATABASE_ADDRESS}"
        --runtime.env "STUDIO_APPLICATION_URL=$${STUDIO_APPLICATION_URL}"
        --runtime.env "STUDIO_APPLICATION_TOKEN=$${STUDIO_APPLICATION_TOKEN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7349:7349"
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7350:7350"
      - "${STUDIO_NAKAMA_BIND_HOST:-127.0.0.1}:7351:7351"
    volumes:
      - ./nakama/build:/nakama/data/modules:ro
      - ./nakama/local.yml:/nakama/data/local.yml:ro
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional tracing UI (Apache-2.0). OTLP on 4317/4318, UI on 16686.
  jaeger:
    image: jaegertracing/jaeger:2.4.0
    profiles: ["observability"]
    ports:
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:16686:16686"
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:4317:4317"
      - "${STUDIO_OBS_BIND_HOST:-127.0.0.1}:4318:4318"
    restart: unless-stopped

  # Object storage and product APIs are intentionally absent. Consumers add
  # only the services their requirements justify.

volumes:
  studio_pg_data:
