# engine-lock.toml - single machine-readable source of truth for engine provenance.
# Rules:
#   * Never track a moving branch for production builds. Commits only.
#   * Any change to this file requires an ADR update (docs/adr/0002) and a green
#     engine-rebuild + smoke run (just engine-build && just export-browser-webgpu).
#   * Patch checksums are verified before source preparation.
#   * Built artifact checksums are recorded after validation; empty
#     checksum tables mean "no reproducible build recorded yet on this machine class".
schema = 2
updated = "2026-07-22"

[godot.official]
repo   = "https://github.com/godotengine/godot"
tag    = "4.7.1-stable"
commit = "a13da4feb8d8aefc283c3763d33a2f170a18d541"
license = "MIT"
role   = "Sole engine upstream. Native editor + all native exports. All game projects must stay compatible with this version."

[godot.webgpu]
base = "4.7.1-stable"
base_commit = "a13da4feb8d8aefc283c3763d33a2f170a18d541"
historical_tree_commit = "14f5effb72ae440a3aa575c801e4aae1a5da7fb8"
source_lineage_repo = "https://github.com/dwalter/godotwebgpu"
source_lineage_commit = "f329e39ce8db7acaa5c9d6628a530fb769969228"
license = "MIT"
status = "beta"
role = "Browser WebGPU export integration reconstructed from official Godot plus Studio Foundation's committed patch series. Official Godot remains the editor of record."
notes = "The WebGPU backend originated in dwalter/godotwebgpu. Studio Foundation owns the 4.7.1 port, scoped patch set, build tooling, browser validation, and release evidence; the historical repository is source lineage only and is not fetched by engine-fetch."

[toolchain]
# Emscripten pin comes from the original backend integration CI.
emscripten = "4.0.11"
scons      = "4.9.1"      # >=4.0 required by Godot; re-verify against godotengine docs at first engine build
python     = "3.11"
# Rust toolchain used for backend services (not for engine builds)
rust       = "1.97.1"
rust_host_windows = "x86_64-pc-windows-gnu"  # no MSVC Build Tools required; see docs/adr/0004

[toolchain.emdawnwebgpu]
version = "v20250531.224602"
revision = "ea66c0fa309f01f2ba1ec2fd2c680cc992eaf72a"
source_sha256 = "02d9f2e8cb40cc4b6730785d731e8b496cb4753eb357a5a097c627e4fb310119"
patched_sha256 = "e6d27c03c17bb1f30e7790e94f9336f8cf3248dc425262bd894cfa770a7dc8f0"
patch = "toolchain/patches/0001-emdawn-private-namespace.patch"
patch_sha256 = "37b48eaa408ef6c8337e36cc5a14d8f30cc7d5a57806e8c8bb1b71f056b62fdc"
upstream_fix_commit = "2752c7d71a190c8512f38ceda922253d23876fb4"
notes = "Backports Dawn's private implementation namespace to prevent the pinned port's global RefCounted type from colliding with Godot's RefCounted at WebAssembly link time."

[build.web_webgpu]
# Flags for building browser export templates from the patched source tree.
target_release = ["platform=web", "target=template_release", "dlink_enabled=no", "threads=no", "webgpu=yes", "opengl3=no"]
target_debug   = ["platform=web", "target=template_debug",   "dlink_enabled=no", "threads=no", "webgpu=yes", "opengl3=no"]

[build.editor_native]
target = ["target=editor", "dev_build=no"]

[patches]
# Complete Studio Foundation WebGPU integration, applied in order to official Godot.
# Third-party license files are included inside their corresponding source patches.
series = [
  { file = "patches/0001-studio-webgpu-engine.patch", sha256 = "b521c25cf3f12c137e81fd2c79a2cbb6cfb0bd5c9fbf4c214a9b648597e7bb1f" },
  { file = "patches/0002-studio-webgpu-spirv.patch", sha256 = "34430a24647d5c90a66647067f11cb80057ee368da5afc4bed37e01945eac888" },
  { file = "patches/0003-studio-webgpu-tint.patch", sha256 = "cd299a648de80465b131834581cf6f53a3208c4100acf1257e4fe031198e370e" },
  { file = "patches/0004-godot-4.7.1-webgpu-interfaces.patch", sha256 = "635e1318287b22202d7c0f840279756abd0887bfe63eddffa3a8ffcc908dd6cb" },
  { file = "patches/0005-webgpu-shell-capability-gate.patch", sha256 = "1d46c4a3b1eeab439c036238af8eed522025a8526b3979b351ab9a0a67bbf9fa" },
  { file = "patches/0006-webgpu-single-thread-stdio.patch", sha256 = "da1e4e44e414e888dce40ba6201240fdf5dfd0997913b127412cf82eca69b006" },
  { file = "patches/0007-tint-storage-buffer-access.patch", sha256 = "708809d830b4559faadf62c11ed68a774dfb1897ddebbd04febf54089207baea" },
  { file = "patches/0008-tint-image-ordering.patch", sha256 = "14af2071b54ca4233b7a5280f2b8c48052a94be18bc64c912c13d07a8576c6db" },
  { file = "patches/0009-tint-volatile-decoration.patch", sha256 = "55e4611a21f3c809e3e3dbf0f6e3fb052f2a8f23e659ca91019306cd25b28fe0" },
  { file = "patches/0010-webgpu-transitive-sampler-split.patch", sha256 = "ef6039b6c68077fd6956745a602778f986aadd15280e1e346f5a89d966c8de39" },
  { file = "patches/0011-webgpu-flatten-decoration-literals.patch", sha256 = "118d06a98d3046010dfe4926698242792125aeb08eac55c65e2abd1e6a323b17" },
  { file = "patches/0012-tint-texture-function-params.patch", sha256 = "b22a21de0dcc1e0df2ae8b50cac055635f48db7faace9917a03e620cbaee81ae" },
]

[artifacts.export_templates]
# Generated by engine-record-artifacts after build validation.
web_webgpu_release = { file = "godot.web.template_release.webgpu.zip", bytes = 11909213, sha256 = "3642cf5e5ee8df6288ed564994686b42ae00f2ac22d3c74ff60c87aa29e3fab0" }
web_webgpu_debug = { file = "godot.web.template_debug.webgpu.zip", bytes = 21708783, sha256 = "1f1ed2b5b93a99801dfbee5cecae3e744547b806a77aefa7a6e7936bee007e62" }

[installed.editor]
# Provenance of the editor binary used for local verification during bootstrap
# (winget GodotEngine.GodotEngine). doctor.py re-checks version string at runtime.
version = "4.7.1.stable.official.a13da4feb"
source  = "winget:GodotEngine.GodotEngine"
export_templates_installed = ["web (official 4.7.1.stable, all variants)"]
