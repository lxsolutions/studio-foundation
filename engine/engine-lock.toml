# engine-lock.toml - single machine-readable source of truth for engine provenance.
# Rules:
#   * Never track a moving branch for production builds. Commits only.
#   * Any change to this file requires an ADR update (docs/adr/0002) and a green
#     engine-rebuild + smoke run (just engine-build && just export-browser-webgpu).
#   * Patch checksums are verified before source preparation.
#   * Built artifact checksums are recorded after validation; empty
#     checksum tables mean "no reproducible build recorded yet on this machine class".
schema = 2
updated = "2026-07-22"

[godot.official]
repo   = "https://github.com/godotengine/godot"
tag    = "4.7.1-stable"
commit = "a13da4feb8d8aefc283c3763d33a2f170a18d541"
license = "MIT"
role   = "Sole engine upstream. Native editor + all native exports. All game projects must stay compatible with this version."

[godot.webgpu]
base = "4.7.1-stable"
base_commit = "a13da4feb8d8aefc283c3763d33a2f170a18d541"
historical_tree_commit = "14f5effb72ae440a3aa575c801e4aae1a5da7fb8"
source_lineage_repo = "https://github.com/dwalter/godotwebgpu"
source_lineage_commit = "f329e39ce8db7acaa5c9d6628a530fb769969228"
license = "MIT"
status = "beta"
role = "Browser WebGPU export integration reconstructed from official Godot plus Studio Foundation's committed patch series. Official Godot remains the editor of record."
notes = "The WebGPU backend originated in dwalter/godotwebgpu. Studio Foundation owns the 4.7.1 port, scoped patch set, build tooling, browser validation, and release evidence; the historical repository is source lineage only and is not fetched by engine-fetch."

[toolchain]
# Emscripten pin comes from the original backend integration CI.
emscripten = "4.0.11"
scons      = "4.9.1"      # >=4.0 required by Godot; re-verify against godotengine docs at first engine build
python     = "3.11"
# Rust toolchain used for backend services (not for engine builds)
rust       = "1.97.1"
rust_host_windows = "x86_64-pc-windows-gnu"  # no MSVC Build Tools required; see docs/adr/0004

[build.web_webgpu]
# Flags for building browser export templates from the patched source tree.
target_release = ["platform=web", "target=template_release", "dlink_enabled=no", "threads=yes"]
target_debug   = ["platform=web", "target=template_debug",   "dlink_enabled=no", "threads=yes"]

[build.editor_native]
target = ["target=editor", "dev_build=no"]

[patches]
# Complete Studio Foundation WebGPU integration, applied in order to official Godot.
# Third-party license files are included inside their corresponding source patches.
series = [
  { file = "patches/0001-studio-webgpu-engine.patch", sha256 = "e41e90b309f0e4ecad5fbb534eee19166027a3689f28a867947955873976a83a" },
  { file = "patches/0002-studio-webgpu-spirv.patch", sha256 = "34430a24647d5c90a66647067f11cb80057ee368da5afc4bed37e01945eac888" },
  { file = "patches/0003-studio-webgpu-tint.patch", sha256 = "cd299a648de80465b131834581cf6f53a3208c4100acf1257e4fe031198e370e" },
]

[artifacts.export_templates]
# Filled in after a reproducible build from engine/scripts/engine.py.
# e.g. web_webgpu_release = { file = "godot.web.template_release.wasm32.zip", sha256 = "..." }

[installed.editor]
# Provenance of the editor binary used for local verification during bootstrap
# (winget GodotEngine.GodotEngine). doctor.py re-checks version string at runtime.
version = "4.7.1.stable.official.a13da4feb"
source  = "winget:GodotEngine.GodotEngine"
export_templates_installed = ["web (official 4.7.1.stable, all variants)"]
